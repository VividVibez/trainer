<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="{{ active_phase_color|default('#FF5500') }}">
  <title>{% block title %}Trainer{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Barlow:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}?v={{ asset_v('css/app.css') }}">
  <style>:root { --phase: {{ active_phase_color|default('#FF5500') }}; }</style>
  <link rel="manifest" href="/static/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Trainer">
  <link rel="apple-touch-icon" href="/static/icon.svg">
</head>
<body>
  <main class="app">
    {% block content %}{% endblock %}
  </main>

  <nav class="tabbar">
    <a href="{{ url_for('planner.home') }}" class="tab {{ 'on' if active=='plan' }}">
      <span class="tab-ico">▣</span><span>Plan</span>
    </a>
    <a href="{{ url_for('pages.phases') }}" class="tab {{ 'on' if active=='phases' }}">
      <span class="tab-ico">◷</span><span>Phases</span>
    </a>
    <a href="{{ url_for('pages.dictionary') }}" class="tab {{ 'on' if active=='dictionary' }}">
      <span class="tab-ico">≣</span><span>Exercises</span>
    </a>
    <a href="{{ url_for('pages.library') }}" class="tab {{ 'on' if active=='library' }}">
      <span class="tab-ico">◰</span><span>Library</span>
    </a>
    <a href="{{ url_for('settings.settings') }}" class="tab {{ 'on' if active=='settings' }}">
      <span class="tab-ico">⚙</span><span>Settings</span>
    </a>
  </nav>

  {% block scripts %}{% endblock %}
</body>
</html>
